name: Router Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-router-packages:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.4"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: router/web/package-lock.json

      - name: Validate tag matches router version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          ROUTER_VERSION="$(cat router/VERSION)"
          if [ "$TAG_VERSION" != "$ROUTER_VERSION" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match router/VERSION (${ROUTER_VERSION})" >&2
            exit 1
          fi

      - name: Build router packages
        working-directory: router
        run: make package

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: router/out/*.ipk
          fail_on_unmatched_files: true
